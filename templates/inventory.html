<!DOCTYPE html>

<html>
<head>
    <title>Inventory Management</title>
<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#e8f5e9,#c8e6c9);
margin:0;
padding:40px;
}

.container{
width:600px;
margin:auto;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0px 8px 20px rgba(0,0,0,0.15);
}

h1{
color:green;
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:30px;
}

label{
display:block;
text-align:left;
margin-left:8%;
font-weight:bold;
color:#2e7d32;
margin-top:15px;
}

input{
width:80%;
padding:12px;
border:2px solid #4caf50;
border-radius:10px;
font-size:16px;
outline:none;
transition:0.3s;
}

input:focus{
border-color:#1b5e20;
box-shadow:0px 0px 10px rgba(76,175,80,0.4);
}

.save-btn{
background:green;
color:white;
padding:12px 30px;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
transition:0.3s;
}

.save-btn:hover{
background:#1b5e20;
transform:scale(1.05);
}

.nav-btn{
background:#2e7d32;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
margin:10px;
cursor:pointer;
transition:0.3s;
}

.nav-btn:hover{
background:#1b5e20;
}

</style>



</head>

<body>



<div class="container">

<h1 style="color:green;">Inventory Management</h1>
<p class="subtitle">
📦 Manage today's hostel inventory before food prediction
</p>

<form method="POST">

<label>🌾 Rice (Kg)</label><br> <input type="number" name="rice"
style="width:80%;padding:10px;margin:10px;"><br>

<label>🥕 Vegetables (Kg)</label><br> <input type="number" name="vegetables"
style="width:80%;padding:10px;margin:10px;"><br>

<label>🥛 Milk (Litres)</label><br> <input type="number" name="milk"
style="width:80%;padding:10px;margin:10px;"><br>

<label>🛢️ Oil (Litres)</label><br> <input type="number" name="oil"
style="width:80%;padding:10px;margin:10px;"><br><br>

<label>🌾 Wheat Flour (Kg)</label><br> <input type="number" name="wheat_flour"
style="width:80%;padding:10px;margin:10px;"><br><br>

<label>🥣 Maida Flour (Kg)</label><br> <input type="number" name="maida_flour"
style="width:80%;padding:10px;margin:10px;"><br><br>


<button type="submit" class="save-btn">
💾 Save Inventory
</button>

</form>

<br>

<a href="/dashboard">
<button class="nav-btn">
📊 Dashboard
</button>
</a>

<a href="/">
<button class="nav-btn">
🏠 Home
</button>
</a>

</div>

</body>


</body>
</html>
