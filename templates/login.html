<!DOCTYPE html>

<html>
<head>
    <title>MealMind Login</title>
</head>

<body style="
font-family:Arial;
background:#f4f6f8;
text-align:center;
padding-top:100px;">

<div style="
background:white;
width:350px;
margin:auto;
padding:30px;
border-radius:15px;
box-shadow:0px 2px 10px lightgray;">

<h1 style="color:green;">🍽 MealMind Login</h1>

<form method="POST">

<input type="text"
name="username"
placeholder="Username"
required
style="
width:80%;
padding:10px;
margin:10px;
border:1px solid #ccc;
border-radius:5px;">

<br>

<input type="password"
name="password"
placeholder="Password"
required
style="
width:80%;
padding:10px;
margin:10px;
border:1px solid #ccc;
border-radius:5px;">

<br><br>

<button type="submit"
style="
background:green;
color:white;
padding:10px 25px;
border:none;
border-radius:5px;
cursor:pointer;">
Login </button>

</form>

</div>

</body>
</html>
